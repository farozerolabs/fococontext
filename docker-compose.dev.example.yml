# Copy this file to docker-compose.yml for local development from source.
# This template builds FocoContext service images from the checked-out repository.
name: fococontext

x-fococontext-env: &fococontext-env
  # Runtime provider settings and concurrency values live
  # in the env file and are shared by API, Worker, Admin, and OCR.
  env_file:
    - ${FOCOCONTEXT_ENV_FILE:-.env}

x-fococontext-build: &fococontext-build
  args:
    FOCOCONTEXT_RELEASE_VERSION: ${FOCOCONTEXT_RELEASE_VERSION:-dev}
    FOCOCONTEXT_RELEASE_REVISION: ${FOCOCONTEXT_RELEASE_REVISION:-local}
    FOCOCONTEXT_RELEASE_BUILD_TIME: ${FOCOCONTEXT_RELEASE_BUILD_TIME:-local}
    FOCOCONTEXT_RELEASE_SOURCE: ${FOCOCONTEXT_RELEASE_SOURCE:-local}

services:
  migrate:
    <<: *fococontext-env
    build:
      <<: *fococontext-build
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "packages/db/dist/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *fococontext-env
    build:
      <<: *fococontext-build
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${FOCOCONTEXT_BIND_HOST:-127.0.0.1}:${FOCOCONTEXT_API_PORT:-18080}:${FOCOCONTEXT_API_PORT:-18080}"
    volumes:
      - ${FOCOCONTEXT_SOURCE_WATCH_HOST_DIR:-./examples/source-watch}:${FOCOCONTEXT_SOURCE_WATCH_CONTAINER_DIR:-/source-watch}:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.FOCOCONTEXT_API_PORT||'18080';fetch('http://127.0.0.1:'+port+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    <<: *fococontext-env
    build:
      <<: *fococontext-build
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/fococontext-worker-ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  ocr-service:
    <<: *fococontext-env
    build:
      <<: *fococontext-build
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    expose:
      - "18082"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request;port=os.environ.get('OCR_SERVICE_PORT','18082');urllib.request.urlopen('http://127.0.0.1:'+port+'/health',timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  admin:
    <<: *fococontext-env
    build:
      <<: *fococontext-build
      context: .
      dockerfile: apps/admin-web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FOCOCONTEXT_BIND_HOST:-127.0.0.1}:${FOCOCONTEXT_ADMIN_PORT:-18081}:${FOCOCONTEXT_ADMIN_PORT:-18081}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.FOCOCONTEXT_ADMIN_PORT||'18081';fetch('http://127.0.0.1:'+port+'/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
    ports:
      - "${FOCOCONTEXT_BIND_HOST:-127.0.0.1}:${FOCOCONTEXT_POSTGRES_PORT:-18432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${FOCOCONTEXT_BIND_HOST:-127.0.0.1}:${FOCOCONTEXT_REDIS_PORT:-18379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
