name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Source validation
    runs-on: ubuntu-latest
    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FOCOCONTEXT_ENV_FILE: .env.example
      FOCOCONTEXT_IMAGE_TAG: 0.1.0
      POSTGRES_DB: fococontext
      POSTGRES_PASSWORD: fococontext
      POSTGRES_USER: fococontext
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          cache: pnpm
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Validate docs
        run: pnpm run docs:validate

      - name: Validate release Compose template
        run: docker compose -f docker-compose.example.yml config --quiet

      - name: Validate development Compose template
        run: docker compose -f docker-compose.dev.example.yml config --quiet
