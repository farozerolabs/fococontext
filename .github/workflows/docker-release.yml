name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish for manual runs. Leave empty to publish sha-<short_sha> only."
        required: false
        type: string
      publish_latest:
        default: false
        description: "Also publish latest for this manual run."
        required: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - image: fococontext-api
            dockerfile: apps/api/Dockerfile
          - image: fococontext-worker
            dockerfile: apps/worker/Dockerfile
          - image: fococontext-admin
            dockerfile: apps/admin-web/Dockerfile
          - image: fococontext-ocr-service
            dockerfile: apps/ocr-service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ matrix.service.image }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          created_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          image_ref="ghcr.io/farozerolabs/${IMAGE}"
          tags="${image_ref}:sha-${short_sha}"
          release_version="sha-${short_sha}"
          release_ref="manual-sha"
          release_source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_version="${version}"
            release_ref="${GITHUB_REF_NAME}"
            tags="${tags}"$'\n'"${image_ref}:${version}"

            if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              minor="${version%.*}"
              tags="${tags}"$'\n'"${image_ref}:${minor}"
              tags="${tags}"$'\n'"${image_ref}:latest"
            fi
          elif [ -n "${INPUT_IMAGE_TAG}" ]; then
            release_version="${INPUT_IMAGE_TAG}"
            release_ref="manual:${INPUT_IMAGE_TAG}"
            tags="${tags}"$'\n'"${image_ref}:${INPUT_IMAGE_TAG}"

            if [ "${INPUT_PUBLISH_LATEST}" = "true" ]; then
              tags="${tags}"$'\n'"${image_ref}:latest"
            fi
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
            echo "release_version=${release_version}"
            echo "release_revision=${GITHUB_SHA}"
            echo "release_source=${release_source}"
            echo "release_ref=${release_ref}"
            echo "created_at=${created_at}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          build-args: |
            FOCOCONTEXT_RELEASE_VERSION=${{ steps.tags.outputs.release_version }}
            FOCOCONTEXT_RELEASE_REVISION=${{ steps.tags.outputs.release_revision }}
            FOCOCONTEXT_RELEASE_BUILD_TIME=${{ steps.tags.outputs.created_at }}
            FOCOCONTEXT_RELEASE_SOURCE=${{ steps.tags.outputs.release_source }}
          labels: |
            org.opencontainers.image.version=${{ steps.tags.outputs.release_version }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.release_revision }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created_at }}
            org.opencontainers.image.source=${{ steps.tags.outputs.release_source }}
            org.opencontainers.image.ref.name=${{ steps.tags.outputs.release_ref }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
