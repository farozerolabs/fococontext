name: Feature request
description: Propose a focused product, API, deployment, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please describe the user problem and the smallest useful change.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer workflow is blocked or harder than it should be?
      placeholder: Describe the workflow and why the current behavior is insufficient.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should FocoContext do?
      placeholder: Describe the API, UI, runtime, documentation, or behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or different approaches.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - API
        - Worker / ingest
        - Retrieval
        - Graph
        - Parser
        - Admin Console
        - SDK
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits, and how would success be measured?
      placeholder: Mention affected users, integrations, scale, latency, quality, or operability goals.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This request is focused on one clear behavior change.
          required: true
